<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Card</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .card-container {
      perspective: 1000px;
    }

    .card {
      width: 260px;
      height: 360px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      overflow: hidden;
      backface-visibility: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      box-sizing: border-box;
    }

    .card-front {
      background: linear-gradient(160deg, #fff1f7, #e6f7ff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .card-front h1 {
      color: #ff6fa5;
      font-size: 28px;
      margin: 0;
    }

    .card-front p {
      color: #888;
      margin-top: 10px;
      font-size: 14px;
    }

    .card-back {
      transform: rotateY(180deg);
      background: #fff;
      position: relative;
    }

    .card-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fireworks canvas */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="card" id="card">

      <div class="card-face card-front">
        <h1>Grattis på födelsedagen!</h1>
        <p>Tryck för att öppna!</p>
      </div>

      <div class="card-face card-back">
        <img src="IMG_9256.PNG" alt="Birthday Image">
      </div>

    </div>
  </div>

  <canvas id="fireworks"></canvas>

  <script>
    const card = document.getElementById('card');
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];

    function createFirework(x, y) {
      for (let i = 0; i < 40; i++) {
        particles.push({
          x: x,
          y: y,
          angle: Math.random() * 2 * Math.PI,
          speed: Math.random() * 4 + 1,
          radius: 2,
          life: 60
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach((p, i) => {
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${Math.random()*360}, 80%, 75%)`;
        ctx.fill();

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      });

      requestAnimationFrame(animate);
    }

    animate();

    card.addEventListener('click', () => {
      card.classList.toggle('flipped');

      // Trigger fireworks
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          createFirework(
            Math.random() * canvas.width,
            Math.random() * canvas.height / 2
          );
        }, i * 200);
      }
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

</body>
</html>
